server:
  port: 8080

spring:
  datasource:
    url: jdbc:mysql://mysql:3306/smart_factory?serverTimezone=Asia/Seoul&characterEncoding=UTF-8
    username: ${MYSQL_USER:smart_factory}
    password: ${MYSQL_PASSWORD:smart_factory}
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        jdbc:
          time_zone: Asia/Seoul

phm:
  mqtt:
    host: mosquitto
    port: 1883
    vibration-topic: ${MQTT_VIBRATION_TOPIC:factory/motor/1/vibration/window}
    qos: ${MQTT_QOS:1}
  ai-api:
    base-url: http://ai-api:8001
  storage:
    raw-window-dir: /app/data/raw_windows
